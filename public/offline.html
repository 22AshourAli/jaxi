<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جاكسي - غير متصل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #1e293b;
      direction: rtl;
    }
    .container {
      max-width: 360px;
      padding: 24px;
      text-align: center;
    }
    .icon-wrapper {
      margin: 0 auto 24px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
      color: #64748b;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748b; font-size: 14px; line-height: 1.7; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding: 12px 24px;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn svg { width: 16px; height: 16px; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      .icon-wrapper { background: #1e293b; }
      .icon-wrapper svg { color: #94a3b8; }
      p { color: #94a3b8; }
    }
    [data-theme="dark"] body, .dark body { background: #0f172a; color: #e2e8f0; }
    [data-theme="dark"] .icon-wrapper { background: #1e293b; }
    [data-theme="dark"] .icon-wrapper svg { color: #94a3b8; }
    [data-theme="dark"] p { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.364 5.636a9 9 0 010 12.728m-2.829-2.829a5 5 0 000-7.07m-4.243 4.243a1 1 0 010-1.414" />
      </svg>
    </div>
    <h1 id="title">أنت غير متصل</h1>
    <p id="desc">تحقق من اتصالك بالإنترنت وحاول مرة أخرى</p>
    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10" />
        <polyline points="1 20 1 14 7 14" />
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
      </svg>
      <span id="btn-text">إعادة المحاولة</span>
    </button>
  </div>
  <script>
    (function() {
      var lang = navigator.language || "";
      var isAr = lang.startsWith("ar") || location.pathname.startsWith("/ar");
      if (!isAr) {
        document.documentElement.dir = "ltr";
        document.documentElement.lang = "en";
        document.title = "Jaxi - Offline";
        document.getElementById("title").textContent = "You're Offline";
        document.getElementById("desc").textContent = "Check your internet connection and try again";
        document.getElementById("btn-text").textContent = "Try Again";
      }
    })();
  </script>
</body>
</html>
